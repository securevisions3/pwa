<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SecureVision NVR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #05080a;
  --bg2:       #080d10;
  --bg3:       #0b1217;
  --panel:     #0d151a;
  --border:    #1a2830;
  --border2:   #243540;
  --green:     #00e676;
  --green-dim: #00603090;
  --green-glow:#00e67620;
  --cyan:      #00bcd4;
  --red:       #f44336;
  --amber:     #ffa726;
  --text:      #c8d8e0;
  --text-dim:  #5a7080;
  --text-mono: #7fbfcf;
  --font:      'Rajdhani', sans-serif;
  --mono:      'Share Tech Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── Scanline overlay ──────────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #0a1a20 0%, #05080a 70%);
  z-index: 1000;
  transition: opacity .4s ease;
}
#login-screen.hidden { opacity: 0; pointer-events: none; }

.login-box {
  width: 360px;
  background: var(--panel);
  border: 1px solid var(--border2);
  box-shadow: 0 0 60px #00e67615, 0 20px 60px #00000080;
  padding: 40px;
  position: relative;
  animation: fadeUp .5s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .icon {
  width: 56px; height: 56px;
  background: var(--green-glow);
  border: 1px solid var(--green);
  border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.login-logo .icon svg { width:28px; height:28px; fill:var(--green); }
.login-logo h1 {
  font-size: 22px; font-weight: 700; letter-spacing: 4px;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-dim);
}
.login-logo p {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 2px;
  color: var(--text-dim);
  margin-top: 4px;
}

.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: 10px; letter-spacing: 2px; font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--green); }
.field input::placeholder { color: var(--text-dim); }

.login-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font);
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  padding: 12px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.login-btn:hover {
  background: var(--green-glow);
  box-shadow: 0 0 20px var(--green-dim);
}
.login-btn:active { transform: scale(.98); }

.login-error {
  margin-top: 16px;
  text-align: center;
  color: var(--red);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  min-height: 16px;
}

.login-status {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 1px;
  color: var(--text-dim);
  text-align: center;
  margin-top: 24px;
}
.status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  margin-right: 6px;
  vertical-align: middle;
}
.status-dot.connecting { background: var(--amber); animation: blink 1s infinite; }
.status-dot.connected  { background: var(--green); }
.status-dot.error      { background: var(--red); }
@keyframes blink { 50% { opacity: .2; } }

/* ═══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════ */
#app {
  display: flex; flex-direction: column;
  height: 100vh;
  opacity: 0; transition: opacity .4s;
}
#app.visible { opacity: 1; }

/* ── Header ────────────────────────────────────────────── */
header {
  height: 48px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
header::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
}

.hdr-logo {
  font-weight: 700; font-size: 15px; letter-spacing: 3px;
  color: var(--green);
  text-shadow: 0 0 15px var(--green-dim);
  white-space: nowrap;
}
.hdr-logo span { font-weight: 300; color: var(--text-dim); }

.hdr-sep { width: 1px; height: 24px; background: var(--border2); }

/* Layout selector */
.layout-btns { display: flex; gap: 4px; }
.layout-btn {
  width: 28px; height: 28px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  padding: 0;
}
.layout-btn svg { width:14px; height:14px; fill:currentColor; }
.layout-btn:hover { border-color: var(--green); color: var(--green); }
.layout-btn.active {
  background: var(--green-glow);
  border-color: var(--green);
  color: var(--green);
}

.hdr-spacer { flex: 1; }

/* Clock */
.hdr-clock {
  font-family: var(--mono);
  font-size: 13px; letter-spacing: 2px;
  color: var(--cyan);
}
.hdr-date {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 1px;
  color: var(--text-dim);
  margin-right: 4px;
}

/* Connection indicator */
.hdr-ws {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  color: var(--text-dim); letter-spacing: 1px;
}

/* User / logout */
.hdr-user {
  font-size: 11px; letter-spacing: 1px;
  color: var(--text-dim);
}
.logout-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 10px; letter-spacing: 1px;
  padding: 4px 10px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all .15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── Grid ──────────────────────────────────────────────── */
#grid-container {
  flex: 1;
  min-height: 0;          /* crucial para que flex hijo no desborde */
  padding: 8px;
  display: grid;
  gap: 6px;
  overflow: hidden;
  background: var(--bg);
}
#grid-container.layout-1  { grid-template-columns: 1fr; grid-template-rows: 1fr; }
#grid-container.layout-4  { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
#grid-container.layout-9  { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
#grid-container.layout-16 { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }

/* ── Camera Cell ───────────────────────────────────────── */
.cam-cell {
  background: var(--bg2);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .2s;
}
.cam-cell:hover { border-color: var(--border2); }
.cam-cell.selected { border-color: var(--green); }
.cam-cell.fullscreen {
  position: fixed !important;
  inset: 0 !important;
  z-index: 500;
  border: none !important;
}

/* Camera image */
.cam-img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

/* No signal placeholder */
.cam-nosignal {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  background: var(--bg2);
}
.cam-nosignal svg { width:32px; height:32px; fill:var(--border2); }
.cam-nosignal span {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 2px; color: var(--border2);
  text-transform: uppercase;
}

/* Overlay: top bar */
.cam-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,.65) 0%,
    transparent 30%,
    transparent 70%,
    rgba(0,0,0,.7) 100%
  );
}
.cam-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px 4px;
}
.cam-name {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: #fff; text-shadow: 0 1px 4px #000;
  text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 70%;
}
.cam-status {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
}
.cam-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim);
  box-shadow: none;
  transition: all .3s;
}
.cam-status-dot.live   { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-dot 2s infinite; }
.cam-status-dot.offline{ background: var(--red); }
@keyframes pulse-dot { 50% { opacity: .5; } }

.cam-status-text {
  color: var(--text-dim);
  font-size: 9px; letter-spacing: 1px;
}

/* Bottom bar */
.cam-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px 6px;
}
.cam-ts {
  font-family: var(--mono); font-size: 9px;
  color: rgba(255,255,255,.5); letter-spacing: .5px;
}
.cam-fps {
  font-family: var(--mono); font-size: 9px;
  color: rgba(255,255,255,.4);
}
.cam-mute-btn {
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 3px;
  color: rgba(255,255,255,.7);
  font-size: 11px;
  padding: 2px 6px;
  cursor: pointer;
  line-height: 1.4;
  transition: all .15s;
  user-select: none;
}
.cam-mute-btn:hover { border-color: var(--green); color: var(--green); }
.cam-mute-btn.unmuted { color: var(--green); border-color: var(--green); }
/* Controles por cámara — abajo derecha */
.cam-controls {
  position: absolute; bottom: 6px; right: 6px;
  display: none; gap: 4px; align-items: center; z-index: 10;
}
.cam-cell:hover .cam-controls,
.cam-cell.selected .cam-controls { display: flex; }
.cam-ctrl-btn {
  background: rgba(0,0,0,.72);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 3px; color: rgba(255,255,255,.82);
  font-size: 11px; padding: 3px 7px; cursor: pointer;
  white-space: nowrap; transition: all .15s;
  user-select: none; font-family: var(--font);
}
.cam-ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.cam-ctrl-btn.active { border-color: var(--green); color: var(--green); }
.cam-ctrl-btn.armed  { border-color: var(--red);   color: var(--red); }
.cam-ctrl-btn.hd-on  { border-color: var(--amber); color: var(--amber); }
/* Timer de sesión */
#view-timer {
  font-family: var(--mono); font-size: 11px; color: var(--amber); margin-left: 8px;
}
#view-timer.urgent { color: var(--red); animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Channel picker overlay */
.cam-picker {
  position: absolute; inset: 0;
  background: rgba(5,8,10,.92);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0;
  pointer-events: all;
  z-index: 10;
  overflow: hidden;
}
.cam-picker.show { display: flex; }
.cam-picker h3 {
  font-size: 11px; letter-spacing: 3px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase;
  margin: 10px 0 6px;
  flex-shrink: 0;
}
/* Lista scrollable */
.cam-picker-list {
  overflow-y: auto;
  overflow-x: hidden;
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 0 8px 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.cam-picker-list::-webkit-scrollbar { width: 4px; }
.cam-picker-list::-webkit-scrollbar-thumb { background: var(--border2); }
.ch-btn {
  width: 100%; max-width: 220px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px; letter-spacing: 1px;
  padding: 5px 10px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.ch-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-glow); }
.ch-btn .ch-mode {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: var(--text-dim);
}
.ch-btn .ch-mode.live { color: var(--green); }
.ch-btn.assigned { border-color: var(--cyan); color: var(--cyan); }
.close-picker {
  margin: 4px 0 6px;
  flex-shrink: 0;
  background: transparent; border: none;
  color: var(--text-dim); font-family: var(--mono);
  font-size: 10px; letter-spacing: 2px;
  cursor: pointer; padding: 4px;
}
.close-picker:hover { color: var(--text); }

/* ── Fullscreen exit hint ──────────────────────────────── */
.fs-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.8);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  padding: 6px 16px;
  pointer-events: none;
  opacity: 0; transition: opacity .3s;
  z-index: 600;
}
.fs-hint.show { opacity: 1; }

/* ── Notification ──────────────────────────────────────── */
.notif {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--green);
  color: var(--text);
  font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
  padding: 10px 16px;
  z-index: 2000;
  opacity: 0; transform: translateX(20px);
  transition: all .3s;
  pointer-events: none;
}
.notif.show { opacity: 1; transform: translateX(0); }
.notif.error { border-left-color: var(--red); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ══════════════════════════════════════════════════════════════
   SecureVision S3 — Alert list styles
   ══════════════════════════════════════════════════════════════ */

/* ── App layout ───────────────────────────────────────────────*/
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#alerts-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Alert card ───────────────────────────────────────────────*/
.alert-card {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color .2s;
}
.alert-card.new-alert {
  border-color: var(--red);
  animation: pulse-border 1s 4;
}
@keyframes pulse-border {
  0%,100% { border-color: var(--red); }
  50%      { border-color: var(--border2); }
}

/* ── Score badge ──────────────────────────────────────────────*/
.alert-score {
  min-width: 54px;
  height: 54px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  border: 1px solid;
  flex-shrink: 0;
}
.alert-score span { font-size: 9px; letter-spacing: 1px; font-family: var(--font); opacity:.7; }
.score-high { color: var(--red);   border-color: var(--red);   background: #f4433612; }
.score-med  { color: var(--amber); border-color: var(--amber); background: #ffa72612; }
.score-low  { color: var(--green); border-color: var(--green); background: #00e67612; }

/* ── Thumbnails ───────────────────────────────────────────────*/
.alert-thumbs { display: flex; gap: 6px; }
.alert-thumb {
  width: 80px;
  height: 60px;
  object-fit: cover;
  border-radius: 2px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg2);
  transition: border-color .2s;
}
.alert-thumb:hover { border-color: var(--cyan); }
.alert-thumb.loading { opacity: .4; }

/* ── Alert info ───────────────────────────────────────────────*/
.alert-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.alert-ts   { font-family: var(--mono); font-size: 13px; color: var(--text); }
.alert-sub  { font-size: 11px; color: var(--text-dim); letter-spacing: .5px; }

/* ── Action buttons ───────────────────────────────────────────*/
.alert-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.alert-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 5px 12px;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: .5px;
  cursor: pointer;
  border-radius: 2px;
  transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.alert-btn:hover           { border-color: var(--cyan); color: var(--cyan); }
.alert-btn.disabled        { opacity: .35; cursor: default; pointer-events: none; }

/* ── Media overlay ────────────────────────────────────────────*/
#media-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  flex-direction: column;
  gap: 12px;
}
#media-overlay.visible { display: flex; }
#media-overlay img,
#media-overlay video {
  max-width: 92vw;
  max-height: 85vh;
  border: 1px solid var(--border2);
  border-radius: 4px;
}
#media-close {
  position: absolute; top: 16px; right: 20px;
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--text);
  width: 36px; height: 36px;
  font-size: 20px; cursor: pointer;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
}
#media-close:hover { border-color: var(--red); color: var(--red); }
#media-content { display: flex; align-items: center; justify-content: center; }

/* ── Empty / load-more ────────────────────────────────────────*/
.alerts-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 1px;
}
.alerts-empty .icon { font-size: 40px; margin-bottom: 12px; }

.load-more-btn {
  align-self: center;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  padding: 8px 24px;
  font-family: var(--font);
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 2px;
  margin: 4px 0 16px;
}
.load-more-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── Header refresh label ─────────────────────────────────────*/
.hdr-refresh {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .5px;
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14c-2.67 0-5.03-1.37-6.41-3.44C6.84 13.91 9.35 13 12 13s5.16.91 6.41 2.56C16.03 17.63 13.67 19 12 19z"/></svg>
      </div>
      <h1>SECUREVISION <span style="color:var(--green);font-size:11px;letter-spacing:2px;">S3</span></h1>
      <p>SISTEMA DE VIGILANCIA IP</p>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="inp-user" placeholder="usuario" autocomplete="username"
             onkeydown="if(event.key==='Enter') document.getElementById('inp-pass').focus()">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">INGRESAR AL SISTEMA</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-status">
      <span class="status-dot" id="ws-dot"></span>
      <span id="ws-status-text">Verificando servidor...</span>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════════════════════════ -->
<div id="app">
  <header>
    <div class="hdr-logo">SECURE<span>VISION</span>
      <span style="font-size:10px;color:var(--green);letter-spacing:2px;margin-left:4px;">S3</span>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-ws">
      <span class="status-dot" id="app-ws-dot" style="width:7px;height:7px;"></span>
      <span id="app-ws-label">--</span>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-ws">
      <span class="status-dot" id="device-dot" style="width:7px;height:7px;background:var(--text-dim);"></span>
      <span id="device-label" style="font-family:var(--mono);font-size:10px;letter-spacing:.5px;">S3 --</span>
    </div>
    <div class="hdr-sep"></div>
    <span class="hdr-refresh" id="hdr-refresh">--</span>
    <div class="hdr-spacer"></div>
    <span class="hdr-date"  id="hdr-date"></span>
    <span class="hdr-clock" id="hdr-clock"></span>
    <div class="hdr-sep"></div>
    <span class="hdr-user" id="hdr-user"></span>
    <button class="logout-btn" onclick="doLogout()">SALIR</button>
  </header>

  <div id="alerts-container"></div>
</div>

<!-- Media lightbox -->
<div id="media-overlay">
  <button id="media-close" onclick="closeMedia()">✕</button>
  <div id="media-content"></div>
</div>

<div class="notif" id="notif"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   SecureVision S3 — Web App
   Conecta con Cloudflare Worker (login, alertas, media desde R2)
   ══════════════════════════════════════════════════════════════ */

const WORKER_URL = 'https://securevision-register.icivil-jmr.workers.dev';
const STOR_KEY   = 'sv_s3_token';
const POLL_MS    = 30000;   /* Polling nuevas alertas cada 30s */

/* ── Estado ──────────────────────────────────────────────────*/
let authToken   = localStorage.getItem(STOR_KEY) || null;
let currentUser = null;
let alerts      = [];
let cursorTs    = null;
let hasMore     = false;
let pollTimer   = null;
let lastRefresh = null;

/* ── Helpers UI ──────────────────────────────────────────────*/
function toast(msg, ms = 3500) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('visible'), ms);
}

function setLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

function setWsDot(state, label) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-status-text');
  dot.className = 'status-dot ' + state;
  if (txt) txt.textContent = label;
}

function setAppDot(ok) {
  document.getElementById('app-ws-dot').className = 'status-dot ' + (ok ? 'connected' : 'error');
  document.getElementById('app-ws-label').textContent = ok ? 'Worker OK' : 'Sin conexión';
}

/* ── Reloj ───────────────────────────────────────────────────*/
function startClock() {
  (function tick() {
    const now = new Date();
    const d = document.getElementById('hdr-date');
    const c = document.getElementById('hdr-clock');
    if (d) d.textContent = now.toLocaleDateString('es-CL');
    if (c) c.textContent = now.toLocaleTimeString('es-CL');
    setTimeout(tick, 1000);
  })();
}

function updateRefreshLabel() {
  const el = document.getElementById('hdr-refresh');
  if (!el || !lastRefresh) return;
  const sec = Math.round((Date.now() - lastRefresh.getTime()) / 1000);
  el.textContent = sec < 60
    ? `actualizado hace ${sec}s`
    : sec < 3600
      ? `actualizado hace ${Math.round(sec/60)}m`
      : `actualizado hace ${Math.round(sec/3600)}h`;
}

/* ── API ─────────────────────────────────────────────────────*/
async function apiLogin(user, pass) {
  const res = await fetch(`${WORKER_URL}/sv-login`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ user, pass }),
  });
  return res.json();
}

async function apiFetch(path) {
  const res = await fetch(`${WORKER_URL}${path}`, {
    headers: { 'Authorization': `Bearer ${authToken}` },
  });
  if (res.status === 401) { doLogout(); throw new Error('Sesión expirada'); }
  return res.json();
}

async function fetchMedia(type, ts) {
  const res = await fetch(`${WORKER_URL}/sv-media/${type}/${ts}`, {
    headers: { 'Authorization': `Bearer ${authToken}` },
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.blob();
}

/* ── Device status ───────────────────────────────────────────*/
async function pollDeviceStatus() {
  try {
    const data = await apiFetch('/sv-device-status');
    const dot   = document.getElementById('device-dot');
    const label = document.getElementById('device-label');
    if (!dot || !label) return;
    const s = data.status || 'unknown';
    if (s === 'online' || s === 'alive') {
      dot.style.background = 'var(--green)';
      label.textContent    = 'S3 ONLINE';
      label.style.color    = 'var(--green)';
    } else if (s === 'offline') {
      dot.style.background = 'var(--red)';
      label.textContent    = '⚠ S3 OFFLINE';
      label.style.color    = 'var(--red)';
    } else {
      dot.style.background = 'var(--text-dim)';
      label.textContent    = 'S3 --';
      label.style.color    = 'var(--text-dim)';
    }
  } catch { /* silencioso */ }
}

/* ── Auth ────────────────────────────────────────────────────*/
async function doLogin() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  if (!user || !pass) { setLoginError('Ingresa usuario y contraseña'); return; }
  setLoginError('');
  setWsDot('connecting', 'Verificando...');
  try {
    const data = await apiLogin(user, pass);
    if (!data.ok) {
      setWsDot('error', 'Error');
      setLoginError(data.error || 'Credenciales incorrectas');
      return;
    }
    authToken   = data.token;
    currentUser = data.user;
    localStorage.setItem(STOR_KEY, authToken);
    onAuthSuccess();
  } catch {
    setWsDot('error', 'Sin conexión');
    setLoginError('No se pudo conectar al servidor');
  }
}

function doLogout() {
  authToken = null; currentUser = null;
  alerts = []; cursorTs = null;
  localStorage.removeItem(STOR_KEY);
  clearInterval(pollTimer);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('inp-pass').value = '';
  document.getElementById('alerts-container').innerHTML = '';
  setWsDot('', 'Verificando servidor...');
}

function onAuthSuccess() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('hdr-user').textContent = currentUser || '●';
  setAppDot(true);
  loadAlerts(true);
  pollDeviceStatus();
  pollTimer = setInterval(pollNewAlerts, POLL_MS);
  setInterval(pollDeviceStatus, 60000);   /* verifica estado S3 cada 60s */
  setInterval(updateRefreshLabel, 10000);
}

/* ── Carga de alertas ────────────────────────────────────────*/
async function loadAlerts(reset = false) {
  if (reset) { alerts = []; cursorTs = null; hasMore = false; }
  const path = cursorTs
    ? `/sv-alerts?limit=20&cursor=${cursorTs}`
    : `/sv-alerts?limit=20`;
  try {
    const data = await apiFetch(path);
    setAppDot(true);
    if (reset) {
      alerts = data.alerts || [];
    } else {
      alerts = [...alerts, ...(data.alerts || [])];
    }
    cursorTs    = data.cursor || null;
    hasMore     = data.has_more || false;
    lastRefresh = new Date();
    updateRefreshLabel();
    renderAlerts();
  } catch (e) {
    setAppDot(false);
    console.error('loadAlerts:', e);
  }
}

async function pollNewAlerts() {
  try {
    const data  = await apiFetch('/sv-alerts?limit=5');
    setAppDot(true);
    const known = new Set(alerts.map(a => a.ts));
    const novel = (data.alerts || []).filter(a => !known.has(a.ts));
    if (novel.length > 0) {
      alerts      = [...novel, ...alerts];
      lastRefresh = new Date();
      updateRefreshLabel();
      renderAlerts(novel.map(a => a.ts));
      toast(`🚨 ${novel.length} nueva${novel.length > 1 ? 's' : ''} alerta${novel.length > 1 ? 's' : ''}`);
    }
  } catch {
    setAppDot(false);
  }
}

/* ── Render ──────────────────────────────────────────────────*/
function formatTs(ts) {
  if (!ts || ts.length < 14) return ts || '--';
  return `${ts.slice(6,8)}/${ts.slice(4,6)}/${ts.slice(0,4)}`
       + `  ${ts.slice(8,10)}:${ts.slice(10,12)}:${ts.slice(12,14)} UTC`;
}

function scoreClass(s) {
  return s >= 80 ? 'score-high' : s >= 60 ? 'score-med' : 'score-low';
}

/* Carga un thumbnail con Authorization header — devuelve blob URL */
function loadThumb(imgEl, type, ts) {
  imgEl.classList.add('loading');
  fetchMedia(type, ts)
    .then(blob => {
      imgEl.src = URL.createObjectURL(blob);
      imgEl.classList.remove('loading');
    })
    .catch(() => {
      imgEl.classList.remove('loading');
      imgEl.style.opacity = '.2';
    });
}

function renderAlerts(highlightTs = []) {
  const container = document.getElementById('alerts-container');
  container.innerHTML = '';

  if (alerts.length === 0) {
    container.innerHTML = `
      <div class="alerts-empty">
        <div class="icon">📭</div>
        <div>No hay alertas registradas</div>
      </div>`;
    return;
  }

  alerts.forEach(alert => {
    const score = alert.score || 0;
    const card  = document.createElement('div');
    card.className = 'alert-card' + (highlightTs.includes(alert.ts) ? ' new-alert' : '');

    /* Score badge */
    const badge = document.createElement('div');
    badge.className = `alert-score ${scoreClass(score)}`;
    badge.innerHTML = `${score}<span>%</span>`;

    /* Thumbnails — usar data-src, no src, para evitar fetch sin auth */
    const thumbBox = document.createElement('div');
    thumbBox.className = 'alert-thumbs';

    ['foto1','foto2'].forEach(type => {
      const img = document.createElement('img');
      img.className = 'alert-thumb';
      img.alt       = type;
      img.onclick   = (e) => { e.stopPropagation(); openMedia('image', type, alert.ts); };
      thumbBox.appendChild(img);
      loadThumb(img, type, alert.ts);
    });

    /* Info */
    const info = document.createElement('div');
    info.className = 'alert-info';
    info.innerHTML = `
      <div class="alert-ts">${formatTs(alert.ts)}</div>
      <div class="alert-sub">IA PERSONA · SCORE ${score}%</div>`;

    /* Actions */
    const actions = document.createElement('div');
    actions.className = 'alert-actions';

    const btnVideo = document.createElement('button');
    btnVideo.className = 'alert-btn' + (alert.has_video ? '' : ' disabled');
    btnVideo.textContent = '▶ VIDEO';
    if (alert.has_video) {
      btnVideo.onclick = (e) => { e.stopPropagation(); openMedia('video', 'video', alert.ts); };
    }
    actions.appendChild(btnVideo);

    card.append(badge, thumbBox, info, actions);
    container.appendChild(card);
  });

  if (hasMore) {
    const btn = document.createElement('button');
    btn.className   = 'load-more-btn';
    btn.textContent = 'Cargar más...';
    btn.onclick     = () => loadAlerts(false);
    container.appendChild(btn);
  }
}

/* ── Media viewer ────────────────────────────────────────────*/
const blobUrls = [];  /* para revocar al cerrar */

function openMedia(kind, type, ts) {
  const overlay = document.getElementById('media-overlay');
  const content = document.getElementById('media-content');
  content.innerHTML = '<span style="color:var(--text-dim);font-family:var(--mono)">Cargando...</span>';
  overlay.classList.add('visible');

  fetchMedia(type, ts)
    .then(blob => {
      const url = URL.createObjectURL(blob);
      blobUrls.push(url);
      content.innerHTML = '';
      if (kind === 'image') {
        const img = document.createElement('img');
        img.src = url;
        content.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.src      = url;
        vid.controls = true;
        vid.autoplay = true;
        content.appendChild(vid);
      }
    })
    .catch(() => {
      content.innerHTML = '<span style="color:var(--red)">Error al cargar</span>';
    });
}

function closeMedia() {
  const overlay = document.getElementById('media-overlay');
  const content = document.getElementById('media-content');
  const vid = content.querySelector('video');
  if (vid) { vid.pause(); vid.src = ''; }
  overlay.classList.remove('visible');
  content.innerHTML = '';
  /* Revocar blob URLs acumuladas */
  blobUrls.forEach(u => URL.revokeObjectURL(u));
  blobUrls.length = 0;
}

/* Cerrar con Escape o click en fondo */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMedia(); });
document.getElementById('media-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('media-overlay')) closeMedia();
});

/* ── Arranque ────────────────────────────────────────────────*/
startClock();

/* Verificar Worker disponible */
fetch(`${WORKER_URL}/sv-alerts`, { headers: { 'Authorization': 'Bearer probe' } })
  .then(res => setWsDot(res.status === 401 ? 'connected' : 'connected', 'Servidor OK'))
  .catch(() => setWsDot('error', 'Servidor no disponible'));

/* Auto-login si hay token guardado */
if (authToken) {
  apiFetch('/sv-alerts?limit=1')
    .then(() => onAuthSuccess())
    .catch(() => { authToken = null; localStorage.removeItem(STOR_KEY); });
}

</script>
</body>
</html>
